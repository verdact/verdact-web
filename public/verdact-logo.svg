<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="125%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1e3a8a" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="white"/>

  <!-- Shield body -->
  <path
    d="M 120,52 L 392,52 L 392,205 Q 390,328 256,372 Q 122,328 120,205 Z"
    fill="url(#shieldGrad)"
    filter="url(#shadow)"
  />

  <!-- Shield inner highlight border -->
  <path
    d="M 136,68 L 376,68 L 376,205 Q 374,310 256,350 Q 138,310 136,205 Z"
    fill="none"
    stroke="rgba(255,255,255,0.15)"
    stroke-width="2"
  />

  <!-- Checkmark -->
  <polyline
    points="170,202 228,272 342,152"
    fill="none"
    stroke="white"
    stroke-width="34"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Wordmark: VERDACT -->
  <text
    x="256" y="424"
    text-anchor="middle"
    font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="60"
    font-weight="800"
    fill="#1e3a8a"
    letter-spacing="7"
  >VERDACT</text>

  <!-- Tagline -->
  <text
    x="256" y="464"
    text-anchor="middle"
    font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="17"
    font-weight="500"
    fill="#6b7280"
    letter-spacing="3.5"
  >DISPUTE · DEFEND · PREVAIL</text>
</svg>
